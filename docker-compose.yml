version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: tamtam-postgres
    environment:
      POSTGRES_USER: tamtam_user
      POSTGRES_PASSWORD: tamtam_secure_pass
      POSTGRES_DB: tamtam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamtam_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:5-alpine
    container_name: tamtam-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: tamtam_user
      MONGO_INITDB_ROOT_PASSWORD: tamtam_secure_pass
      MONGO_INITDB_DATABASE: tamtam_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tamtam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tamtam-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://tamtam_user:tamtam_secure_pass@postgres:5432/tamtam_db
      MONGODB_URL: mongodb://tamtam_user:tamtam_secure_pass@mongodb:27017/tamtam_db
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  default:
    name: tamtam-network
